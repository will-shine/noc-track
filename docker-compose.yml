version: '3.8'

services:
  # Service Aplikasi Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noc-track-app
    restart: unless-stopped
    # env_file: .env
    volumes:
      - ./:/var/www/html
    networks:
      - npm_network

  # Service Web Server (Nginx) untuk melayani file PHP
  webserver:
    image: nginx:alpine
    container_name: noc-track-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker-compose/nginx/app.conf:/etc/nginx/conf.d/default.conf 
    networks:
      - npm_network

  # Service Database
  db:
    image: mysql:8.0
    container_name: noc-track-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: noc12345678
      MYSQL_ROOT_PASSWORD: noc12345678
      MYSQL_PASSWORD: noc12345678
      MYSQL_USER: noc12345678
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - npm_network

networks:
  npm_network:
    external: true # Pastikan ini nama network yang sama dengan Nginx Proxy Manager

volumes:
  dbdata:
    driver: local